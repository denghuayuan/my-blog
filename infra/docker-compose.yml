services:
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped

  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/my-blog}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:${WEB_PORT:-80}}
      SERVER_BASE_URL: ${SERVER_BASE_URL:-http://localhost:${WEB_PORT:-80}}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
    expose:
      - "3000"
    volumes:
      - uploads-data:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  mongo:
    image: mongo:8
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo-data:
  uploads-data:
